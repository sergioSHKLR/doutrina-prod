<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <!-- Google Fonts Import -->
  <link href="https://fonts.googleapis.com/css2?family=Homemade+Apple&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Russo+One&display=swap" rel="stylesheet">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://googleapis.com" rel="stylesheet">
  <style>
    /* Insira aqui TODO o bloco <style> que refinamos */
    :root {
      --center-green: #2a5247;
      --border-green: #0d1a15;
      --paper-yellow: #fdf5a2;
      --base-size: 36vmin;
      --wax-red: #941b1b;
      color-scheme: light;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body,
    html {
      height: 100vh;
      width: 100vw;
      background: radial-gradient(circle, var(--center-green) 0%, var(--border-green) 100%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .brand {
      font-family: 'Russo One', sans-serif;
      font-size: 3rem;
      margin-bottom: 20px;
      z-index: 100;
      color: rgba(0, 0, 0, 0.3);
      text-shadow: 1px 1px 1px rgba(255, 255, 255, 0.1), -1px -1px 1px rgba(0, 0, 0, 0.5);
    }

    .scene {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 8vmin;
      perspective: 1500px;
    }

    .post-it {
      position: relative;
      width: var(--base-size);
      aspect-ratio: 1 / 1;
      background: var(--paper-yellow);
      box-shadow: 5px 5px 15px rgba(0, 0, 0, 0.4), 25px 35px 50px rgba(0, 0, 0, 0.6);
      transform: rotate(-1.5deg) translateZ(80px);
      background-image: url("https://transparenttextures.com");
      clip-path: polygon(0 0, 100% 0, 100% 82%, 82% 100%, 0 100%);
      z-index: 10;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 30px;
    }

    .post-it::after {
      content: "";
      position: absolute;
      bottom: 0;
      right: 0;
      width: 18%;
      height: 18%;
      background: linear-gradient(135deg, #d4c5a0 50%, transparent 50%);
      box-shadow: -5px -5px 15px rgba(0, 0, 0, 0.2);
    }

    .note-text {
      font-family: 'Homemade Apple', cursive;
      font-size: 1.3rem;
      color: #333;
      line-height: 2;
      text-align: center;
      opacity: 0;
      animation: fadeIn 2s forwards 1.5s;
    }

    .polaroid-frame {
      width: var(--base-size);
      aspect-ratio: 8.85 / 10.75;
      background: #fdfdfd;
      box-shadow: 10px 10px 30px rgba(0, 0, 0, 0.5);
      transform: rotate(4deg) translateZ(20px);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: calc(var(--base-size) * 0.05);
      z-index: 5;
    }

    .photo-area {
      width: 90%;
      aspect-ratio: 1 / 1;
      background: #000;
      position: relative;
      overflow: hidden;
      box-shadow: inset 0 0 15px rgba(0, 0, 0, 0.8);
    }

    .photo-area::after {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: url("./assets/images/grin.png") center/cover no-repeat;
      opacity: 0;
      animation: photoReveal 2s ease-in forwards 1.5s;
    }

    .actions {
      margin-top: 40px;
      display: flex;
      align-items: center;
      gap: 50px;
      opacity: 0;
      animation: fadeIn 1s forwards 4.5s;
      z-index: 100;
    }

    .btn-help {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 5.5rem;
      filter: drop-shadow(4px 6px 8px rgba(0, 0, 0, 0.6));
      transition: transform 0.2s;
    }

    .btn-help:hover {
      transform: scale(1.1) rotate(-10deg);
    }

    .wax-seal-container {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.2s;
    }

    .wax-seal-container:hover {
      transform: scale(1.1);
    }

    .wax-seal {
      font-size: 5.5rem;
      line-height: 1;
      filter: drop-shadow(5px 8px 12px rgba(0, 0, 0, 0.7));
    }

    .wax-text {
      position: absolute;
      font-family: arial;
      font-size: 1.7rem;
      color: rgba(0, 0, 0, 0.4);
      text-shadow: 0.5px 0.5px 1px rgba(255, 255, 255, 0.2), -0.5px -0.5px 1px rgba(0, 0, 0, 0.4);
      text-transform: lowercase;
      pointer-events: none;
      user-select: none;
      margin-top: 5px;
    }

    @keyframes fadeIn {
      to {
        opacity: 1;
      }
    }

    @keyframes photoReveal {
      from {
        opacity: 0;
        filter: brightness(0);
      }

      to {
        opacity: 1;
        filter: brightness(1);
      }
    }

    @media (max-width: 600px) {
      .scene {
        flex-direction: column;
        gap: 5vmin;
      }

      :root {
        --base-size: 60vmin;
      }

      .brand {
        font-size: 2.2rem;
        margin-bottom: 5px;
      }

      .btn-help {
        font-size: 4rem;
      }

      .wax-seal {
        font-size: 4.5rem;
      }
    }
  </style>
</head>

<body>
  <div class="brand">💧 doutrina.org</div>
  <p>&nbsp;</p>
  <div class="scene">
    <div class="post-it">
      <div class="note-text">
        <p>Para que vos outorgou Deus a inteligência e o saber, senão para os repartirdes com os vossos irmãos, senão para fazerdes que se adiantem pela senda que conduz à bem-aventurança, à felicidade eterna?
<br /><br />
São Agostinho<br />São Luiz</p>

      </div>
    </div>
    <div class="polaroid-frame">
    <div class="photo-area"></div>
    <p
        style="font-family: 'Homemade Apple', cursive; font-size: 1.3rem; color: #333; margin-top: 1.5vmin; opacity: 0; animation: fadeIn 2s forwards 1.5s; text-align: center;">
        Allan Kardec<br>18 de Abril de 1857
    </p>
</div>
  </div>
  <div class="actions">
    <button class="btn-help" title="Instruções">🧭</button>
    <a href="0-onboarding.html" class="wax-seal-container">
        <span class="wax-seal">🔴</span>
        <span class="wax-text">entrar</span>
    </a>
</div>
</body>

</html>
